      background: rgba(200, 20, 20, 0.45);
      z-index: 9999; pointer-events: none;
      animation: flashFade 0.7s ease-out forwards;
    }
    @keyframes flashFade { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 0; } }

    /* Shake animation — vertical rumble, no side-to-side */
    .shake { animation: shakeIt 0.5s ease-in-out; }
    @keyframes shakeIt {
      0%, 100% { transform: translateY(0); }
      15% { transform: translateY(-4px); }

      45% { transform: translateY(-3px); }

  <script>
    function generateSessionId() {
      return 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    }

    var OG_TRACK = {
      sessionId: generateSessionId(),
      consentMessages: false,
      names: [],
    };

    function ogTrack(action, data) {
      try {
        fetch('/api/track', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: action,
            data: Object.assign({ session_id: OG_TRACK.sessionId }, data),
          }),
        }).catch(function() {});
      } catch (e) {}
    }

    function anonymizeText(text, names) {
      if (!text || !names || names.length === 0) return text;
      var result = text;
      var letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      names.forEach(function(name, i) {
        if (name && name.trim()) {
          var regex = new RegExp(name.trim().replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
          result = result.replace(regex, 'Person ' + letters[i]);
        }
      });
      return result;
    }

    ogTrack('create_session', { consent_messages: false });
  </script>

const SYSTEM_PROMPT = `You are the Human Tradition Facilitator from One Game by Jase Berger. You sound like Jase — a direct New Zealand guy who maps how humans connect. Not a therapist. Not a coach. A facilitator who drives conversations toward defined outcomes.

YOUR PRIMARY JOB:
You are a compressor. You take messy human conversation and compress it through four steps into defined outcomes. Two equal goals: QUALITY (foundations are solid, voices heard, positions clear) and OUTCOME (something concrete everyone signs off on). Move with purpose. Don't linger.

TONE RULES:
- Use half the words you think you need. Cut fluff.
- Don't credit people for showing up or saying things. No "great question" or "I love that." People are not here for validation.
- Praise is RARE and EARNED. When someone genuinely breaks new ground or shows real courage, drop one line that lands hard. Because it's rare, it means something.
- Be direct: "I got that." "Say more." "What's actually going on there?" "What would it look like if you tried something different?"
- Never say: "hold space," "do the work," "safe space," "I hear you," "that's valid," "boundaries," "journey," "navigate," "powerful."
- One question at a time. Short sentences. No monologues.
- You can be funny and blunt. Don't wrap things in cotton wool.

THE FOUR STEPS (this is a pipeline, not a winding path):

STEP ONE — VOICE:
Two jobs: 1) Establish the subject clearly. 2) Hear the first voice fully. Both must be complete before moving on. Ask: "What's the subject here?" and "Tell me your position on this." Confirm you've got both, then suggest moving to Step Two.

STEP TWO — COMPARISON:
Everyone else catches up. Each person states their position on the subject (what Person A got to do in Step One). Then dig: Is there alignment anywhere? Compromises worth exploring? Before moving to Step Three, actively hunt for micro-agreements — shared ground, common understanding, small details they agree on. Stack them. When everyone has been heard and you've found what common ground exists, move to Step Three.

STEP THREE — GAME:
Since 100% agreement on everything isn't realistic, we gamify toward an outcome. Present specific options:

VOTE — How many voters? Do they want to bring in more people for a stronger ballot? Establish rules. Everyone types "agree" + their name to confirm.

THIRD PARTY SUPPORT — Someone they all respect or who's removed from the emotion. Options: 1) Get this person's perspective only. 2) Give them voting power (how many votes: 1, 2, 3, or 5?). 3) Make their decision binding. Everyone types "agree" + name to confirm terms.

DEBATE — Formal logic competition. Some people vote on who's most convincing, the ones with strong opinions present their case but don't vote. Winner takes the outcome. Agree on terms first.

SETTLE BY SKILL — Paper scissors rock, chess, arm wrestle, a race, a video game — anything. Ask what game they want. If stuck, brainstorm options. Agree on terms + names.

If none of these fit, move to Step Four.

STEP FOUR — FATE:
Last resort. Leave it to luck. Coin flip, dice roll, random draw. Suggest terms: "Can we agree that if it lands heads, we do X, tails we do Y?" Get everyone to type "agree" + name. Then execute.

THE THREE RESPONSES (your constant lens):
Every moment, assess: is this AGAIN, FORCE, or AGREE?

AGAIN — When the conversation hits a wall or a deeper issue surfaces, bookmark all progress and reset to Step One. Say something like: "New info just came through. Bookmarking where we are. Let's go back to Step One and give [name] the floor on this, then we'll climb back up." Expect this to happen repeatedly — each cycle is faster and hits deeper layers.

FORCE — If someone is bulldozing, manipulating, telling others what to think or feel, or avoiding the process: name it directly. "That's force. Let's pull back and use the steps." Return to driving for Again or Agree. Remind users they can call out force on each other too.

AGREE — Not just the big resolution. Every micro-agreement counts: confirming understanding, agreeing on game rules, agreeing to stay in the process, acknowledging a shared detail. Stack them all. Remember every one for the summary later. This is the win — stacking micro-agreements builds relationship and workability.

THE OTHER FRAMEWORK PARTS (use as gears, don't explain them):

RELATIONSHIPS (Peer/Pro) — Are the right people in this conversation? Should someone else be consulted? Does someone here have authority the group should recognise? Use when it helps, not every time.

MORAL BASIS — When people are stuck, ask "why." What guides their thinking? What conviction sits under their position? This digs to the heart of what divides people. May require a reset to Step One to explore.

CULTURELESS — No judgment of any culture, belief, or worldview. The framework sits between cultures so everyone can engage.

JUBILEE — Agreements need refresh dates. Authority needs re-election. Nothing is permanent.

CONFRONTATION vs CONFLICT — Confrontation is necessary and healthy. Conflict is choosing opposition over connection. Peace is kindness even in confrontation.

FACILITATION STYLE:
- 85% structured compression: ask the right question, confirm the answer, stack the agreement, move on.
- 15% wildcard: throw unexpected suggestions that break patterns. "How about we just vote right now with these terms?" or "Hold on — I don't think we actually got what [name] meant. Back to Step One." These keep it alive and human.
- The conversation must ALWAYS be on a step or transitioning between steps. If it drifts, pull it back.
- Keep track of which step you're on. Reference it naturally.
- In multi-person mode, make sure each person completes each step's requirements before moving.
- For solo sessions, you play the comparison role — challenge their thinking, present the other side, push for clarity.
- Use people's names.
- When the conversation wraps up, say: "Feels like we're at a good place. When you're ready, you'll see options to save your progress." The app handles the end-of-session flow.

DASHBOARD AWARENESS:
The app has a dashboard with buttons users can press. When they do, you'll see [Dashboard: ...] messages. Respond to these naturally and briefly. The dashboard tracks: which step is active, Force/Again/Agree responses, and agreements stacked.

FOR "CURIOUS ABOUT THE FRAMEWORK" MODE:
Explain concepts conversationally. Let them lead with questions. Keep answers tight. Don't lecture — give enough to be useful, keep enough back to make the book worth reading. Mention "One Game" has visuals and diagrams that bring it to life.

FOR "CONTINUING A PREVIOUS CONVERSATION" MODE:
Read their agreement document. Show you've taken it in with one line. Ask what they want to build on. Don't summarise back at them.`;

  const pickRandom = (arr) => arr[Math.floor(Math.random() * arr.length)];

  // ─── EFFECT TRIGGERS ───
  const triggerForce = () => {
    setShowForceFlash(true);
    setShaking(true);

  const isMulti = peopleCount > 1;
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

  const nameDisplay = () => {
    const filled = names.filter((n) => n.trim());
    if (filled.length === 0) return "there";
    if (filled.length === 1) return filled[0];
    return filled.slice(0, -1).join(", ") + " and " + filled[filled.length - 1];
  };

  const buildOpeningInstruction = () => {
    const n = nameDisplay();
    const bookStatus = readBook ? "They have read One Game." : "They have not read One Game yet.";

    if (purpose === "continue") {
      const docContext = previousDoc.trim();
      if (isMulti) {
        const nameList = names.filter((nm) => nm.trim()).map((nm, i) => letters[i] + ": " + nm).join(", ");
        return "This is a multi-person facilitation session. People: " + nameList + ". They are continuing a previous conversation and have provided their agreement document from last time. " + bookStatus + ".\n\nAGREEMENT DOCUMENT FROM PREVIOUS SESSION:\n" + docContext + "\n\nGreet them warmly by name, briefly acknowledge what they worked on last time (don't summarise the whole doc), and ask what they want to improve, add to, or build on from this foundation. Remind them to tag messages with their letter.";
      }
      return "Solo session with " + n + ". They are continuing a previous conversation and have provided their agreement document from last time. " + bookStatus + ".\n\nAGREEMENT DOCUMENT FROM PREVIOUS SESSION:\n" + docContext + "\n\nGreet them warmly by name, briefly acknowledge what they worked on (don't summarise the whole doc back at them — just show you've taken it in), and ask what they want to improve, add to, or build on from this foundation.";
    }

    if (isMulti) {
      const nameList = names.filter((nm) => nm.trim()).map((nm, i) => letters[i] + ": " + nm).join(", ");
      return "This is a multi-person facilitation session. People: " + nameList + ". Their purpose: \"" + purpose + "\". " + bookStatus + ". Send your opening message to greet them all by name, remind them to tag messages with their letter, and begin facilitation.";
    }

    const purposeMap = {
      skills: "Solo session with " + n + ". Purpose: learning interpersonal skills. Context area: " + context + ". " + bookStatus + ". Greet them warmly by name and ask about a recent conversation that mattered to them in that area.",
      stuck: "Solo session with " + n + ". Purpose: they're stuck on a specific situation. Context area: " + context + ". " + bookStatus + ". Greet them warmly by name and ask them to describe what's happening.",
      curious: "Solo session with " + n + ". Purpose: curious about One Game and the Lovetopia mission. " + bookStatus + ". Greet warmly, ask what caught their attention, and let them lead with questions.",
      coaching: "Solo session with " + n + ". Purpose: wants coaching support. Context area: " + context + ". " + bookStatus + ". Greet warmly and ask what patterns they notice in their conversations.",
      evolve: "Solo session with " + n + ". Purpose: wants to evolve their humanity. " + bookStatus + ". Greet warmly. Say \"Let's explore how you see human connection. I'll ask some questions that might challenge you. No wrong answers - just honest ones.\" Then ask about their deepest belief about whether humans can truly connect across difference.",
    };
    return purposeMap[purpose] || "Solo session with " + n + ". " + bookStatus + ". Greet them and begin.";
  };

  const callAPI = async (conversationMessages) => {
    try {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: conversationMessages }),
      });
      const data = await response.json();
      const text = data.content
        ?.filter((b) => b.type === "text")
        .map((b) => b.text)
        .join("\n");
      return text || "I'm here with you. Could you share a bit more?";
    } catch (e) {
      console.error(e);
      return "Something went wrong on my end. Could you try sending that again?";
    }
  };

  const startChat = async (bookAnswer) => {
    setReadBook(bookAnswer);
    setScreen("chat");
    setLoading(true);

    // ─── TRACKING ───
    OG_TRACK.names = names.filter(function(n) { return n.trim(); });
    ogTrack('update_session', {
      people_count: peopleCount,
      purpose: purpose,
      context: context || null,
      read_book: bookAnswer,
      reached_chat: true,
      consent_messages: consent,
    });
    ogTrack('track_event', { event_type: 'chat_started', screen: 'chat', event_data: { people_count: peopleCount, purpose: purpose, context: context, read_book: bookAnswer } });

    const opening = buildOpeningInstruction();
    const firstMsg = {
      role: "user",
      content: SYSTEM_PROMPT + "\n\n---\n\nSESSION CONTEXT:\n" + opening,
    };

    const reply = await callAPI([firstMsg]);

    // ─── TRACKING: log first AI message if consented ───
    if (OG_TRACK.consentMessages) {
      ogTrack('track_message', { role: 'assistant', content: anonymizeText(reply, OG_TRACK.names), message_index: 0 });
    }

    setMessages([
      { role: "system_hidden", content: firstMsg.content },
      { role: "assistant", content: reply },
    ]);
    setLoading(false);
  };

  const sendMessage = async () => {
    const text = userInput.trim();
    if (!text || loading) return;
    setUserInput("");

    const newMessages = [...messages, { role: "user", content: text }];
    setMessages(newMessages);
    setLoading(true);

    // ─── TRACKING: log user message ───
    const visibleCount = newMessages.filter(function(m) { return m.role === 'user' || m.role === 'assistant'; }).length;
    if (OG_TRACK.consentMessages) {
      ogTrack('track_message', { role: 'user', content: anonymizeText(text, OG_TRACK.names), message_index: visibleCount - 1 });
    }
    ogTrack('update_session', { message_count: visibleCount });

    // ─── Consume dashboard events for AI context ───
    const pendingEvents = consumeDashboardEvents();
    const eventPrefix = pendingEvents.length > 0 ? pendingEvents.join("\n") + "\n\n" : "";

    const apiMessages = [];
    let firstUser = true;
    for (const m of newMessages) {
      if (m.role === "jase_note") continue;
      if (m.role === "system_hidden") {
        apiMessages.push({ role: "user", content: m.content });
        firstUser = false;
      } else if (m.role === "user") {
        if (firstUser) {
          apiMessages.push({
            role: "user",
            content: SYSTEM_PROMPT + "\n\n---\n\nUser: " + m.content,
          });
          firstUser = false;
        } else {
          // Add dashboard events to the latest user message only
          const isLast = m === newMessages[newMessages.length - 1];
          const content = isLast && eventPrefix ? eventPrefix + m.content : m.content;
          apiMessages.push({ role: "user", content: content });
        }
      } else if (m.role === "assistant") {
        apiMessages.push({ role: "assistant", content: m.content });
      }
    }

    const reply = await callAPI(apiMessages);
    const updatedMessages = [...newMessages, { role: "assistant", content: reply }];

    // ─── TRACKING: log AI reply ───
    const newVisibleCount = updatedMessages.filter(function(m) { return m.role === 'user' || m.role === 'assistant'; }).length;
    if (OG_TRACK.consentMessages) {
      ogTrack('track_message', { role: 'assistant', content: anonymizeText(reply, OG_TRACK.names), message_index: newVisibleCount - 1 });
    }
    ogTrack('update_session', { message_count: newVisibleCount });

    // Count user messages for milestones
    const userMsgCount = updatedMessages.filter((m) => m.role === "user").length;
    const alreadyShown = updatedMessages.filter((m) => m.role === "jase_note").map((m) => m.milestone);
    
    if (userMsgCount >= 20 && !alreadyShown.includes(20)) {
      updatedMessages.push({
        role: "jase_note",
        milestone: 20,
        content: "Hey, it's Jase here. Just dropping you an automated message because you've spent a good amount of time in this session — I'm so happy you're getting value from this. Keep going!\n\nThis also means myself and a few good humans are carrying the costs to keep this running. If you'd like to support this contribution to the world, a small donation in the form of a paid subscription on my Substack is a great way to give back. We're happy to let this be a gift, but we can only fund so much.\n\nAll Substack income goes directly to helping more people access this experience.\n\nSo — have you been levelled up by the people financially backing this for you? If so, the offer is extended to you to keep spreading the love and connection.\n\nHead over to lovetopia.substack.com and subscribe to a paid plan to be part of making a positive impact.\n\nIn joy, Jase — and the wonderful humans making this happen."
      });
    }
    
    if (userMsgCount >= 30 && !alreadyShown.includes(30)) {
      updatedMessages.push({
        role: "jase_note",
        milestone: 30,
        content: "Jase here again. Remember to share with me how you're finding this — it directly informs edits on my book and helps make this app better and better.\n\nI want the good, the bad, the ugly, and what's really inspired you.\n\nA big thanks to you for participating here. I'll let you get back to your chat.\n\nJase Berger"
      });
    }
    
    if (userMsgCount >= 100 && !alreadyShown.includes(100)) {
      updatedMessages.push({
        role: "jase_note",
        milestone: 100,
        content: "Jase here again. OK wow — you're amazing. You just hit 100 messages in this chat. You must have dug down some big rabbit holes and found some real great stuff that kept you going.\n\nIf you don't contact me personally and tell me what you found for yourself, I will have to hunt you down and get it out of you in person.\n\nBut honestly, reach out to me and tell me all about this chat. I love hearing people's experiences and aha moments.\n\nOne of my personal goals here is to hear from the most diverse people in the world, all interacting in the same framework — so that one day I can be one of the most qualified people on Earth to peacefully connect cultures to a new epic era of humanity in the space age.\n\nYou being here is part of that. So thank you.\n\nKeep it up,\nJase"
      });
    }
    
    setMessages(updatedMessages);
    setLoading(false);
  };

  const handleKeyDown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  };

  const generateAgreementDoc = async () => {
    setGeneratingDoc(true);
    const visibleMessages = messages.filter((m) => m.role !== "system_hidden" && m.role !== "jase_note");
    const transcript = visibleMessages
      .map((m) => (m.role === "user" ? "User" : "Facilitator") + ": " + m.content)
      .join("\n\n");

    const today = new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
    const docPrompt = [
      {
        role: "user",
        content: "You are creating an agreement document from a facilitation session. Read this conversation transcript and create a concise, snappy document that captures:\n\n1. SITUATION — A brief summary of what was being worked on (2-3 sentences max)\n2. AGREEMENTS REACHED — Specific micro-agreements, commitments, and breakthroughs. Be specific and actionable.\n3. OPEN THREADS — Anything unresolved that could be picked up in a future session.\n4. NEXT STEPS — What the person/people committed to trying.\n\nFormat it cleanly. Keep it short and punchy — this is a working document, not an essay. It should be useful if pasted into a new session to pick up where they left off.\n\nStart with:\nONE GAME — AGREEMENT DOCUMENT\nSession: " + today + "\nParticipants: " + nameDisplay() + "\n\nTRANSCRIPT:\n" + transcript,
      },
    ];

    const doc = await callAPI(docPrompt);
    setAgreementDoc(doc);
    setGeneratingDoc(false);
  };

  const downloadChat = () => {
    const visibleMessages = messages.filter((m) => m.role !== "system_hidden" && m.role !== "jase_note");
    const text = visibleMessages
      .map((m) => (m.role === "user" ? "You" : "Facilitator") + ": " + m.content)
      .join("\n\n---\n\n");
    const header = "ONE GAME — CONVERSATION LOG\nDate: " + new Date().toLocaleDateString() + "\nParticipants: " + nameDisplay() + "\n\n========================================\n\n";
    const blob = new Blob([header + text], { type: "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "one-game-conversation-" + Date.now() + ".txt";
    a.click();
    URL.revokeObjectURL(url);
  };

  const copyAgreementDoc = () => {
    navigator.clipboard.writeText(agreementDoc).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  // --- RENDER ---

  const renderHeader = () => (
    <div style={styles.header}>
      <div style={styles.headerTitle}>&#9651; One Game</div>
      <div style={styles.headerSub}>The Human Tradition Facilitator</div>
      {screen === "chat" && isMulti && (
        <div style={styles.legend}>
          {names.filter((n) => n.trim()).map((n, i) => letters[i] + ": " + n).join("  ·  ")}
        </div>
      )}
    </div>
  );

  if (screen === "journey") {
    return (
      <div style={styles.container}>
        <div style={styles.inner}>
          {renderHeader()}
          <div style={styles.body}>
            <div style={styles.card}>
              <p style={{ ...styles.text, fontSize: 16, lineHeight: 1.8, fontWeight: 600 }}>
                Hey, it's Jase Berger here.
              </p>
              <p style={{ ...styles.text, marginTop: 18, fontSize: 15.5, lineHeight: 1.8 }}>
                I created this app to test my framework — the Human Tradition — and the concepts in my book, which I'm publishing this year.
              </p>
              <p style={{ ...styles.text, marginTop: 16, fontSize: 15.5, lineHeight: 1.8 }}>
                The core purpose is to make our universal human patterns more conscious, so we can live into connection in profound ways and develop our humanity as much as we're developing our technology.
              </p>
              <p style={{ ...styles.text, marginTop: 16, fontSize: 15.5, lineHeight: 1.8 }}>
                The good news for you personally? The best way to achieve this is by helping you become an even more effective human.
              </p>
              <p style={{ ...styles.text, marginTop: 16, fontSize: 15.5, lineHeight: 1.8 }}>
                What an irony that AI provides such a powerful way to do this. At the beginning of my book I point out the importance for technology and philosophy to evolve in lockstep.
              </p>
              <p style={{ ...styles.text, marginTop: 16, fontSize: 15.5, lineHeight: 1.8 }}>
                Tell me what works, what doesn't, what surprises you. Your input directly shapes my book and this mission: developing humanity to the space age.
              </p>
              <p style={{ ...styles.text, marginTop: 16, fontSize: 15.5, lineHeight: 1.8 }}>
                Thank you for your ongoing support. It means a lot to me, and will mean a lot for how effective this project becomes.
              </p>
              <p style={{ ...styles.text, marginTop: 28, fontSize: 17, fontWeight: 700, color: COLORS.gold }}>
                It's time to level up!
              </p>
              <p style={{ ...styles.text, marginTop: 16, fontSize: 15, fontStyle: "italic", color: COLORS.textLight }}>
                {"In joy,\nJase Berger"}
              </p>
              <div style={{ marginTop: 32 }}>
                <HoverButton
                  style={{ ...styles.btn, background: COLORS.gold, color: COLORS.white, fontWeight: 600, textAlign: "center" }}
                  hoverStyle={{ background: COLORS.goldLight }}
                  onClick={() => {
                    ogTrack('track_event', { event_type: 'screen_view', screen: 'welcome' });
                    setScreen("welcome");
                  }}
                >
                  I'm ready
                </HoverButton>
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  if (screen === "welcome") {
    return (
      <div style={styles.container}>
        <div style={styles.inner}>
          {renderHeader()}
          <div style={styles.body}>
            <div style={styles.card}>
              <p style={{ ...styles.text, fontSize: 16, lineHeight: 1.8 }}>
                The experience you're about to have will feel different. You'll get different results.
              </p>
              <p style={{ ...styles.text, marginTop: 16, fontSize: 15.5, lineHeight: 1.8 }}>
                The heart of the framework guiding the AI here is a four-step process for making decisions and coming to agreement with others. If you want more info on any concept, just ask the AI — it'll build it out for you.
              </p>
              <p style={{ ...styles.text, marginTop: 16, fontSize: 15.5, lineHeight: 1.8 }}>
                This process comes from my intuition, finally wrestled into a structure I can share. If I've done my job well, you'll find it intuitive yet firmly driving toward better outcomes.
              </p>
              <p style={{ ...styles.text, marginTop: 16, fontSize: 15.5, lineHeight: 1.8 }}>
                Allow things to come up and be lived out here. You're about to build new conversational muscles — skills you can take into everyday life to drive toward real breakthroughs.
              </p>
              <p style={{ ...styles.text, marginTop: 16, fontSize: 15.5, lineHeight: 1.8 }}>
                I built this because I believe in the power of human connection. My hope is that you will too, in ever deeper ways.
              </p>
              <div style={{ ...styles.privacyNote, marginTop: 22, marginBottom: 0 }}>
                <strong style={{ fontStyle: "normal", color: COLORS.text }}>Your privacy</strong>
                <br />
                There are no accounts or logins here. This conversation is not saved anywhere and is not linked to you in any way. Once you close this page, all record of it is gone.
                <br /><br />
                You can copy and paste from the chat at any time. Before the session closes, you'll be given the option to generate a summary of your agreements and download the conversation. You can paste that summary into a new session if you want to pick up where you left off.
              </div>
              <div style={{ marginTop: 16, display: "flex", alignItems: "flex-start", gap: 10 }}>
                <input
                  type="checkbox"
                  id="consent"
                  checked={consent}
                  onChange={(e) => {
                    setConsent(e.target.checked);
                    OG_TRACK.consentMessages = e.target.checked;
                    ogTrack('update_session', { consent_messages: e.target.checked });
                  }}
                  style={{ marginTop: 3, accentColor: COLORS.gold, cursor: "pointer" }}
                />
                <label htmlFor="consent" style={{ fontSize: 13, color: COLORS.textLight, lineHeight: 1.5, cursor: "pointer" }}>
                  Help improve this tool by sharing your anonymised conversation data
                </label>
              </div>
              <div style={{ marginTop: 28 }}>
                <HoverButton
                  style={{ ...styles.btn, background: COLORS.gold, color: COLORS.white, fontWeight: 600, textAlign: "center" }}
                  hoverStyle={{ background: COLORS.goldLight }}
                  onClick={() => {
                    ogTrack('track_event', { event_type: 'screen_view', screen: 'people' });
                    setScreen("people");
                  }}
                >
                  Let's begin
                </HoverButton>
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  if (screen === "people") {
    return (
      <div style={styles.container}>
        <div style={styles.inner}>
          {renderHeader()}
          <div style={styles.body}>
            <div style={styles.card}>
              <p style={styles.text}>How many people are in this conversation?</p>
              <div style={{ marginTop: 20 }}>
                {[
                  { label: "Just me", count: 1 },
                  { label: "2 people", count: 2 },
                  { label: "3 people", count: 3 },
                  { label: "4+", count: 4 },
                ].map((opt) => (
                  <HoverButton
                    key={opt.count}
                    style={styles.btn}
                    hoverStyle={styles.btnHover}
                    onClick={() => {
                      setPeopleCount(opt.count);
                      setNames(Array(opt.count === 1 ? 1 : opt.count).fill(""));
                      setExtraInputs(opt.count === 4 ? 4 : opt.count);
                      ogTrack('track_event', { event_type: 'people_count', screen: 'people', event_data: { count: opt.count } });
                      ogTrack('track_event', { event_type: 'screen_view', screen: 'names' });
                      setScreen("names");
                    }}
                  >
                    {opt.label}
                  </HoverButton>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  if (screen === "names") {
    const isSolo = peopleCount === 1;
    const inputCount = isSolo ? 1 : extraInputs;
    return (
      <div style={styles.container}>
        <div style={styles.inner}>
          {renderHeader()}
          <div style={styles.body}>
            <div style={styles.card}>
              <p style={styles.text}>
                {isSolo ? "What's your name?" : "Enter names. Each person gets a letter (A, B, C…) to tag messages."}
              </p>
              {Array.from({ length: inputCount }).map((_, i) => (
                <div key={i}>
                  {!isSolo && <span style={styles.label}>Person {letters[i]}</span>}
                  <input
                    style={{ ...styles.input, ...(isSolo ? { marginTop: 18 } : {}) }}
                    placeholder={isSolo ? "Your name" : "Name"}
                    value={names[i] || ""}
                    onChange={(e) => {
                      const updated = [...names];
                      updated[i] = e.target.value;
                      while (updated.length <= i) updated.push("");
                      setNames(updated);
                    }}
                    onFocus={(e) => (e.target.style.borderColor = COLORS.gold)}
                    onBlur={(e) => (e.target.style.borderColor = COLORS.sand)}
                  />
                </div>
              ))}
              {peopleCount >= 4 && (
                <HoverButton
                  style={{ ...styles.btn, marginTop: 14, textAlign: "center", fontSize: 14, color: COLORS.gold }}
                  hoverStyle={styles.btnHover}
                  onClick={() => {
                    setExtraInputs((p) => p + 1);
                    setNames((prev) => [...prev, ""]);
                  }}
                >
                  + Add person
                </HoverButton>
              )}
              <div style={{ marginTop: 22 }}>
                <HoverButton
                  style={{ ...styles.btn, background: COLORS.gold, color: COLORS.white, fontWeight: 600, textAlign: "center", opacity: names.some((n) => n.trim()) ? 1 : 0.5 }}
                  hoverStyle={{ background: COLORS.goldLight }}
                  onClick={() => {
                    if (!names.some((n) => n.trim())) return;
                    const nextScreen = isSolo ? "purpose_solo" : "purpose_multi";
                    ogTrack('track_event', { event_type: 'screen_view', screen: nextScreen });
                    setScreen(nextScreen);
                  }}
                >
                  Continue
                </HoverButton>
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  if (screen === "purpose_solo") {
    const n = names[0] || "there";
    const options = [
      { label: "I want to learn interpersonal skills", key: "skills" },
      { label: "I'm stuck on a specific situation", key: "stuck" },
      { label: "Tell me about One Game & the Lovetopia mission", key: "curious" },
      { label: "I want coaching support", key: "coaching" },
      { label: "I'm continuing a previous conversation", key: "continue" },
      { label: "I want to evolve my humanity", key: "evolve", special: true },
    ];
    return (
      <div style={styles.container}>
        <div style={styles.inner}>
          {renderHeader()}
          <div style={styles.body}>
            <div style={styles.card}>
              <p style={styles.text}>Hey {n}, what brings you here?</p>
              <div style={{ marginTop: 20 }}>
                {options.map((opt) => (
                  <HoverButton
                    key={opt.key}
                    style={opt.special ? { ...styles.btn, ...styles.btnSpecial } : styles.btn}
                    hoverStyle={opt.special ? styles.btnSpecialHover : styles.btnHover}
                    onClick={() => {
                      setPurpose(opt.key);
                      ogTrack('track_event', { event_type: 'purpose_selected', screen: 'purpose_solo', event_data: { purpose: opt.key } });
                      if (opt.key === "continue") {
                        ogTrack('track_event', { event_type: 'screen_view', screen: 'paste_doc' });
                        setScreen("paste_doc");
                      } else if (opt.key === "curious" || opt.key === "evolve") {
                        ogTrack('track_event', { event_type: 'screen_view', screen: 'book' });
                        setScreen("book");
                      } else {
                        ogTrack('track_event', { event_type: 'screen_view', screen: 'context' });
                        setScreen("context");
                      }
                    }}
                  >
                    {opt.label}
                  </HoverButton>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  if (screen === "purpose_multi") {
    const options = [
      { label: "Resolve a disagreement", key: "disagree" },
      { label: "Find more agreement", key: "agree" },
      { label: "Make a decision together", key: "decide" },
      { label: "Strengthen our connection", key: "connect" },
      { label: "We're continuing a previous conversation", key: "continue" },
    ];
    return (
      <div style={styles.container}>
        <div style={styles.inner}>
          {renderHeader()}
          <div style={styles.body}>
            <div style={styles.card}>
              <p style={styles.text}>Welcome {nameDisplay()}. What brings you here together?</p>
              <div style={{ marginTop: 20 }}>
                {options.map((opt) => (
                  <HoverButton
                    key={opt.key}
                    style={styles.btn}
                    hoverStyle={styles.btnHover}
                    onClick={() => {
                      setPurpose(opt.key);
                      ogTrack('track_event', { event_type: 'purpose_selected', screen: 'purpose_multi', event_data: { purpose: opt.key } });
                      if (opt.key === "continue") {
                        ogTrack('track_event', { event_type: 'screen_view', screen: 'paste_doc' });
                        setScreen("paste_doc");
                      } else {
                        ogTrack('track_event', { event_type: 'screen_view', screen: 'book' });
                        setScreen("book");
                      }
                    }}
                  >
                    {opt.label}
                  </HoverButton>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  if (screen === "paste_doc") {
    return (
      <div style={styles.container}>
        <div style={styles.inner}>
          {renderHeader()}
          <div style={styles.body}>
            <div style={styles.card}>
              <p style={styles.text}>Welcome back.</p>
              <p style={{ ...styles.text, marginTop: 14 }}>
                Please paste your existing agreement document below. This is the summary from your previous session — it helps us pick up where you left off and keep making progress together.
              </p>
              <textarea
                style={{ ...styles.input, marginTop: 18, minHeight: 160, resize: "vertical", lineHeight: 1.6 }}
                placeholder="Paste your agreement document here..."
                value={previousDoc}
                onChange={(e) => setPreviousDoc(e.target.value)}
                onFocus={(e) => (e.target.style.borderColor = COLORS.gold)}
                onBlur={(e) => (e.target.style.borderColor = COLORS.sand)}
              />
              <div style={{ marginTop: 22 }}>
                <HoverButton
                  style={{ ...styles.btn, background: COLORS.gold, color: COLORS.white, fontWeight: 600, textAlign: "center", opacity: previousDoc.trim() ? 1 : 0.5 }}
                  hoverStyle={{ background: COLORS.goldLight }}
                  onClick={() => {
                    if (!previousDoc.trim()) return;
                    ogTrack('track_event', { event_type: 'screen_view', screen: 'book' });
                    setScreen("book");
                  }}
                >
                  Continue
                </HoverButton>
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  if (screen === "context") {
    return (
      <div style={styles.container}>
        <div style={styles.inner}>
          {renderHeader()}
          <div style={styles.body}>
            <div style={styles.card}>
              <p style={styles.text}>
                {purpose === "stuck" ? "What kind of situation?" : "What area of your life?"}
              </p>
              <div style={{ marginTop: 20 }}>
                {["Partner / Family", "Friendship", "Workplace", "Community / Group"].map((opt) => (
                  <HoverButton
                    key={opt}
                    style={styles.btn}
                    hoverStyle={styles.btnHover}
                    onClick={() => {
                      setContext(opt);
                      ogTrack('track_event', { event_type: 'context_selected', screen: 'context', event_data: { context: opt } });
                      ogTrack('track_event', { event_type: 'screen_view', screen: 'book' });
                      setScreen("book");
                    }}
                  >
                    {opt}
                  </HoverButton>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  if (screen === "book") {
    return (
      <div style={styles.container}>
        <div style={styles.inner}>
          {renderHeader()}
          <div style={styles.body}>
            <div style={styles.card}>
              <p style={styles.text}>Have you read One Game?</p>
              <div style={{ marginTop: 20 }}>
                <HoverButton style={styles.btn} hoverStyle={styles.btnHover} onClick={() => {
                  ogTrack('track_event', { event_type: 'book_answer', screen: 'book', event_data: { read: true } });
                  setReadBook(true);
                  setScreen("subscribe");
                }}>
                  Yes
                </HoverButton>
                <HoverButton style={styles.btn} hoverStyle={styles.btnHover} onClick={() => {
                  ogTrack('track_event', { event_type: 'book_answer', screen: 'book', event_data: { read: false } });
                  setReadBook(false);
                  setScreen("subscribe");
                }}>
                  Not yet
                </HoverButton>
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  if (screen === "subscribe") {
    const handleSubscribe = async () => {
      if (!subscribeEmail.trim()) return;
      setSubscribeStatus("sending");
      try {
        const response = await fetch("/api/subscribe", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: subscribeEmail.trim(), name: names[0] || "" }),
        });
        if (response.ok) {
          setSubscribeStatus("success");
          ogTrack('track_event', { event_type: 'newsletter_subscribed', screen: 'subscribe' });
          setTimeout(() => startChat(readBook), 1500);
        } else {
          setSubscribeStatus("error");
        }
      } catch (e) {
        setSubscribeStatus("error");
      }
    };

    return (
      <div style={styles.container}>
        <div style={styles.inner}>
          {renderHeader()}
          <div style={styles.body}>
            <div style={styles.card}>
              <p style={{ ...styles.text, fontSize: 16, fontWeight: 600 }}>
                The Lovetopia Letters
              </p>
              <p style={{ ...styles.text, marginTop: 14 }}>
                The app uses a framework with concepts that go deep. The Lovetopia Letters break down each part — one idea at a time, straight to your inbox.
              </p>
              <p style={{ ...styles.text, marginTop: 12 }}>
                Think of it as the companion guide to what you're about to experience here. Each letter explores one concept so you can get more out of every session.
              </p>

              {subscribeStatus === "success" ? (
                <div style={{
                  marginTop: 22,
                  padding: "16px 20px",
                  background: "rgba(39,174,96,0.08)",
                  border: "1px solid #27AE60",
                  borderRadius: 10,
                  textAlign: "center",
                }}>
                  <p style={{ fontSize: 15, color: "#27AE60", fontWeight: 600, fontFamily: "'Georgia', serif" }}>
                    You're in. Check your inbox.
                  </p>
                  <p style={{ fontSize: 13, color: COLORS.textLight, marginTop: 6, fontFamily: "'Georgia', serif" }}>
                    Loading your session…
                  </p>
                </div>
              ) : (
                <React.Fragment>
                  <input
                    type="email"
                    value={subscribeEmail}
                    onChange={(e) => setSubscribeEmail(e.target.value)}
                    onKeyDown={(e) => { if (e.key === "Enter") handleSubscribe(); }}
                    placeholder="Your email"
                    style={{ ...styles.input, marginTop: 20 }}
                    onFocus={(e) => (e.target.style.borderColor = COLORS.gold)}
                    onBlur={(e) => (e.target.style.borderColor = COLORS.sand)}
                  />

                  {subscribeStatus === "error" && (
                    <p style={{ fontSize: 13, color: "#C0392B", marginTop: 8 }}>
                      Something went wrong. Try again or skip below.
                    </p>
                  )}

                  <HoverButton
                    style={{
                      ...styles.btn,
                      marginTop: 14,
                      background: COLORS.gold,
                      color: COLORS.white,
                      fontWeight: 600,
                      textAlign: "center",
                      opacity: subscribeEmail.trim() && subscribeStatus !== "sending" ? 1 : 0.5,
                    }}
                    hoverStyle={{ background: COLORS.goldLight }}
                    onClick={handleSubscribe}
                  >
                    {subscribeStatus === "sending" ? "Subscribing…" : "Subscribe & start my session"}
                  </HoverButton>

                  <HoverButton
                    style={{
                      ...styles.btn,
                      textAlign: "center",
                      fontSize: 14,
                      color: COLORS.gold,
                      marginTop: 4,
                    }}
                    hoverStyle={styles.btnHover}
                    onClick={() => {
                      ogTrack('track_event', { event_type: 'newsletter_already_subscribed', screen: 'subscribe' });
                      startChat(readBook);
                    }}
                  >
                    I'm already subscribed
                  </HoverButton>

                  <HoverButton
                    style={{
                      ...styles.btn,
                      textAlign: "center",
                      fontSize: 14,
                      color: COLORS.textLight,
                      border: "none",
                      marginTop: 0,
                    }}
                    hoverStyle={{ color: COLORS.gold }}
                    onClick={() => {
                      ogTrack('track_event', { event_type: 'newsletter_skipped', screen: 'subscribe' });
                      startChat(readBook);
                    }}
                  >
                    No thanks
                  </HoverButton>
                </React.Fragment>
              )}
            </div>
          </div>
        </div>
      </div>
    );
  }

  if (screen === "chat") {
    const visibleMessages = messages.filter((m) => m.role !== "system_hidden");
    return (
      <div style={styles.container}>
        {/* ─── FLASH OVERLAYS (outside inner to avoid layout issues) ─── */}
        {showForceFlash && <div className="force-flash" />}
        {showRewindFlash && <div className="rewind-flash" />}

        <div style={{ ...styles.inner, overflow: "hidden" }} className={shaking ? "shake" : ""}>
          {renderHeader()}

          {/* ─── TOP DASHBOARD (sticky) ─── */}
          <div style={{
            padding: "10px 16px 8px",
            background: COLORS.cream,
            borderBottom: "1px solid " + COLORS.sand,
            display: "flex",
            flexDirection: "column",
            gap: 7,
            position: "sticky",
            top: 76,
            zIndex: 9,
          }}>
            {/* Three Responses: ↩ Return | ➤ Force (small) | ↑ Agree */}
            <div style={{ display: "flex", gap: 6, alignItems: "stretch" }}>
              <button onClick={triggerReturnStep1} style={{
                flex: 2, padding: "9px 6px", border: "1px solid " + COLORS.gold, borderRadius: 8,
                background: COLORS.goldBg, color: COLORS.gold, fontSize: 12,
                fontFamily: "'Georgia', serif", cursor: "pointer", fontWeight: 600,
                transition: "all 0.15s",
              }}>
                &#8617; Again
              </button>
              <button onClick={triggerForce} style={{
                flex: 1, padding: "9px 4px", border: "1px solid #C0392B", borderRadius: 8,
                background: "rgba(192,57,43,0.08)", color: "#C0392B", fontSize: 11,
                fontFamily: "'Georgia', serif", cursor: "pointer", fontWeight: 600,
                transition: "all 0.15s",
              }}>
                &#10148; Force
              </button>
              <button onClick={() => setPendingAgreement(true)} style={{
                flex: 2, padding: "9px 6px", border: "1px solid #27AE60", borderRadius: 8,
                background: "rgba(39,174,96,0.08)", color: "#27AE60", fontSize: 12,
                fontFamily: "'Georgia', serif", cursor: "pointer", fontWeight: 600,
                transition: "all 0.15s",
              }}>
                &#8593; Agree
              </button>
            </div>

            {/* Pending agreement confirmation */}
            {pendingAgreement && (
              <div style={{
                display: "flex", gap: 6, alignItems: "center",
                background: COLORS.white,
                border: "1px solid #27AE60",
                borderRadius: 8,
                padding: "8px 10px",
              }}>
                <input
                  value={agreementInput}
                  onChange={(e) => setAgreementInput(e.target.value)}
                  onKeyDown={(e) => { if (e.key === "Enter" && agreementInput.trim()) triggerAgreement(agreementInput.trim()); }}
                  placeholder="What was agreed?"
                  autoFocus
                  style={{
                    flex: 1, border: "none", outline: "none", fontSize: 13,
                    fontFamily: "'Georgia', serif", color: COLORS.text, background: "transparent",
                  }}
                />
                <button onClick={() => { if (agreementInput.trim()) triggerAgreement(agreementInput.trim()); }} style={{
                  padding: "6px 14px", background: "#27AE60", color: COLORS.white,
                  border: "none", borderRadius: 6, fontSize: 12, fontFamily: "'Georgia', serif",
                  cursor: "pointer", fontWeight: 600,
                }}>
                  Confirm
                </button>
                <button onClick={() => { setPendingAgreement(null); setAgreementInput(""); }} style={{
                  padding: "6px 8px", background: "transparent", color: COLORS.textLight,
                  border: "none", fontSize: 14, cursor: "pointer",
                }}>
                  &#10005;
                </button>
              </div>
            )}

            {/* Pending step change with reason */}
            {pendingStepChange && (
              <div style={{
                display: "flex", gap: 6, alignItems: "center",
                background: COLORS.white,
                border: "1px solid " + COLORS.gold,
                borderRadius: 8,
                padding: "8px 10px",
              }}>
                <span style={{ fontSize: 12, color: COLORS.gold, fontWeight: 600, whiteSpace: "nowrap" }}>
                  {"Step " + pendingStepChange + ":"}
                </span>
                <input
                  value={stepChangeReason}
                  onChange={(e) => setStepChangeReason(e.target.value)}
                  onKeyDown={(e) => { if (e.key === "Enter") confirmStepChange(); }}
                  placeholder="Why? (optional)"
                  autoFocus
                  style={{
                    flex: 1, border: "none", outline: "none", fontSize: 13,
                    fontFamily: "'Georgia', serif", color: COLORS.text, background: "transparent",
                  }}
                />
                <button onClick={confirmStepChange} style={{
                  padding: "6px 14px", background: COLORS.gold, color: COLORS.white,
                  border: "none", borderRadius: 6, fontSize: 12, fontFamily: "'Georgia', serif",
                  cursor: "pointer", fontWeight: 600,
                }}>
                  Go
                </button>
                <button onClick={() => { setPendingStepChange(null); setStepChangeReason(""); }} style={{
                  padding: "6px 8px", background: "transparent", color: COLORS.textLight,
                  border: "none", fontSize: 14, cursor: "pointer",
                }}>
                  &#10005;
                </button>
              </div>
            )}

            {/* Four Steps as buttons */}
            <div style={{ display: "flex", gap: 4 }}>
              {[1, 2, 3, 4].map(step => (
                <button key={step} onClick={() => suggestStep(step)} style={{
                  flex: 1, padding: "7px 4px", borderRadius: 7,
                  border: step === currentStep ? "2px solid " + COLORS.gold : "1px solid " + COLORS.sand,
                  background: step === currentStep ? COLORS.gold : COLORS.white,
                  color: step === currentStep ? COLORS.white : (step < currentStep ? COLORS.gold : COLORS.textLight),
                  fontSize: 11, fontFamily: "'Georgia', serif", cursor: "pointer",
                  fontWeight: step === currentStep ? 700 : 400,
                  transition: "all 0.2s",
                  opacity: step === currentStep ? 1 : 0.85,
                }}>
                  {step + ". " + stepNames[step].split(" — ")[0]}
                </button>
              ))}
            </div>

            {/* Coin stack */}
            {agreements.length > 0 && (
              <div
                onClick={() => setShowCoinList(!showCoinList)}
                style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", padding: "2px 0" }}
              >
                <div style={{ display: "flex", alignItems: "flex-end" }}>
                  {agreements.slice(-10).map((a, i) => (
                    <div key={a.id} className={i === agreements.slice(-10).length - 1 && lastCoinBounce ? "coin-bounce" : ""} style={{
                      width: 24, height: 24, borderRadius: "50%",
                      background: "linear-gradient(135deg, #FFD700, #B8860B)",
                      border: "2px solid #8B6914",
                      marginLeft: i > 0 ? -9 : 0,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontSize: 10, color: COLORS.white, fontWeight: 700,
                      boxShadow: "0 2px 4px rgba(0,0,0,0.2)",
                    }}>
                      {agreements.length - agreements.slice(-10).length + i + 1}
                    </div>
                  ))}
                </div>
                <span style={{ fontSize: 12, color: COLORS.gold, fontWeight: 600 }}>
                  {agreements.length + " agreement" + (agreements.length !== 1 ? "s" : "")}
                  <span style={{ fontSize: 10, color: COLORS.textLight, marginLeft: 4 }}>{showCoinList ? "▲" : "▼"}</span>
                </span>
              </div>
            )}

            {/* Expanded coin list */}
            {showCoinList && agreements.length > 0 && (
              <div style={{
                background: COLORS.white,
                border: "1px solid " + COLORS.sand,
                borderRadius: 8,
                padding: "10px 14px",
                maxHeight: 150,
                overflowY: "auto",
              }}>
                {agreements.map((a, i) => (
                  <div key={a.id} style={{
                    fontSize: 13,
                    color: COLORS.text,
                    padding: "4px 0",
                    borderBottom: i < agreements.length - 1 ? "1px solid " + COLORS.cream : "none",
                    display: "flex",
                    gap: 8,
                  }}>
                    <span style={{ color: COLORS.gold, fontWeight: 700 }}>{"#" + (i + 1)}</span>
                    <span>{a.label}</span>
                    <span style={{ marginLeft: "auto", color: COLORS.textLight, fontSize: 11 }}>{"Step " + a.step}</span>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* ─── CHAT FRAME ─── */}
          <div style={{
            flex: 1,
            margin: "12px 12px 0",
            background: COLORS.white,
            border: "1px solid " + COLORS.sand,
            borderRadius: "16px 16px 0 0",
            display: "flex",
            flexDirection: "column",
            overflow: "hidden",
            boxShadow: "0 2px 12px rgba(184,134,11,0.06)",
          }}>
            <div ref={chatRef} style={{
              flex: 1,
              overflowY: "auto",
              padding: "18px 14px",
              display: "flex",
              flexDirection: "column",
              gap: 14,
            }}>
              {visibleMessages.map((m, i) => {
                if (m.role === "jase_note") {
                  return (
                    <div key={i} style={styles.jaseNote}>
                      <div style={styles.jaseNoteHeader}>A note from Jase</div>
                      {m.content}
                      {m.milestone === 20 && (
                        <div style={{ marginTop: 14 }}>
                          <a href="https://lovetopia.substack.com/" target="_blank" rel="noopener noreferrer" style={{ display: "inline-block", padding: "10px 20px", background: COLORS.gold, color: COLORS.white, borderRadius: 8, fontFamily: "'Georgia', serif", fontSize: 14, fontWeight: 600, textDecoration: "none" }}>
                            Subscribe at lovetopia.substack.com
                          </a>
                        </div>
                      )}
                    </div>
                  );
                }
                return (
                  <div key={i} style={m.role === "user" ? styles.userBubble : styles.aiBubble}>
                    {m.content}
                  </div>
                );
              })}
              {loading && <div style={styles.listening}>Listening…</div>}

              {showEndSession && (
                <div style={styles.endSessionPanel}>
                  <div style={styles.privacyNote}>
                    This conversation is not saved and is not linked to any of your information. Once you close this page, all record of it is gone.
                  </div>

                  {!agreementDoc && !generatingDoc && (
                    <React.Fragment>
                      <HoverButton
                        style={{ ...styles.btn, marginTop: 0, background: COLORS.gold, color: COLORS.white, fontWeight: 600, textAlign: "center" }}
                        hoverStyle={{ background: COLORS.goldLight }}
                        onClick={generateAgreementDoc}
                      >
                        Summarise my agreements
                      </HoverButton>
                      <HoverButton
                        style={{ ...styles.btn, textAlign: "center" }}
                        hoverStyle={styles.btnHover}
                        onClick={downloadChat}
                      >
                        Download this conversation
                      </HoverButton>
                      <HoverButton
                        style={{ ...styles.btn, textAlign: "center" }}
                        hoverStyle={styles.btnHover}
                        onClick={() => setShowEndSession(false)}
                      >
                        Keep talking — I'm not done yet
                      </HoverButton>
                    </React.Fragment>
                  )}

                  {generatingDoc && (
                    <p style={{ ...styles.text, fontSize: 14, fontStyle: "italic", color: COLORS.textLight, textAlign: "center", marginTop: 12 }}>
                      Building your agreement document…
                    </p>
                  )}

                  {agreementDoc && (
                    <div>
                      <p style={{ ...styles.text, fontSize: 14, fontWeight: 600, marginTop: 4 }}>
                        Your Agreement Document
                      </p>
                      <p style={{ fontSize: 13, color: COLORS.textLight, fontStyle: "italic", marginTop: 4, lineHeight: 1.5 }}>
                        Copy this and paste it into a new session anytime to pick up where you left off.
                      </p>
                      <div style={styles.agreementDoc}>{agreementDoc}</div>
                      <div style={{ marginTop: 12 }}>
                        <button
                          style={{ ...styles.copyBtn, background: copied ? COLORS.goldLight : COLORS.gold }}
                          onClick={copyAgreementDoc}
                        >
                          {copied ? "Copied!" : "Copy to clipboard"}
                        </button>
                        <button style={styles.copyBtn} onClick={downloadChat}>
                          Download full chat
                        </button>
                      </div>
                      <HoverButton
                        style={{ ...styles.btn, marginTop: 14, textAlign: "center" }}
                        hoverStyle={styles.btnHover}
                        onClick={() => setShowEndSession(false)}
                      >
                        Keep talking — I'm not done yet
                      </HoverButton>
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* ─── STICKY INPUT BAR (inside frame) ─── */}
            <div style={{
              padding: "10px 12px 14px",
              borderTop: "1px solid " + COLORS.sand,
              background: COLORS.white,
              display: "flex",
              gap: 8,
              alignItems: "flex-end",
              borderRadius: "0 0 0 0",
            }}>
              {!showEndSession && (
                <button
                  style={{
                    background: "none",
                    border: "none",
                    color: COLORS.textLight,
                    fontSize: 20,
                    cursor: "pointer",
                    padding: "8px",
                    borderRadius: 8,
                    lineHeight: 1,
                    flexShrink: 0,
                  }}
                  onClick={() => {
                    ogTrack('track_event', { event_type: 'end_session_opened', screen: 'chat' });
                    setShowEndSession(true);
                  }}
                  title="End session"
                >
                  &#9632;
                </button>
              )}
              <textarea
                ref={inputRef}
                style={styles.chatInput}
                rows={1}
                placeholder={isMulti ? "Tag with your letter (A, B…)…" : "Share what's on your mind…"}
                value={userInput}
                onChange={(e) => setUserInput(e.target.value)}
                onKeyDown={handleKeyDown}
                onFocus={(e) => (e.target.style.borderColor = COLORS.gold)}
                onBlur={(e) => (e.target.style.borderColor = COLORS.sand)}
              />
              <button
                style={{ ...styles.sendBtn, opacity: userInput.trim() && !loading ? 1 : 0.5 }}
                onClick={sendMessage}
                disabled={!userInput.trim() || loading}
              >
                Send
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
