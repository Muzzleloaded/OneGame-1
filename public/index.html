/* Red flash overlay for Force */
.force-flash {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(200, 20, 20, 0.45);
  z-index: 9999; pointer-events: none;
  animation: flashFade 0.7s ease-out forwards;
}
@keyframes flashFade { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 0; } }

/* Shake animation — vertical rumble, no side-to-side */
.shake { animation: shakeIt 0.5s ease-in-out; }
@keyframes shakeIt {
  0%, 100% { transform: translateY(0); }
  15% { transform: translateY(-4px); }
  30% { transform: translateY(3px); }
  45% { transform: translateY(-3px); }
  60% { transform: translateY(2px); }
  75% { transform: translateY(-1px); }
}

/* Rewind pulse for Return to Step 1 */
.rewind-flash {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(184, 134, 11, 0.15);
  z-index: 9999; pointer-events: none;
  animation: rewindFade 0.8s ease-out forwards;
}
@keyframes rewindFade { 0% { opacity: 1; } 100% { opacity: 0; } }

/* Coin bounce and jingle */
.coin-bounce {
  animation: coinDrop 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes coinDrop {
  0% { transform: translateY(-30px) scale(0.3) rotate(-20deg); opacity: 0; }
  30% { transform: translateY(2px) scale(1.15) rotate(8deg); opacity: 1; }
  45% { transform: translateY(-6px) scale(0.95) rotate(-5deg); }
  60% { transform: translateY(1px) scale(1.05) rotate(3deg); }
  75% { transform: translateY(-2px) scale(0.98) rotate(-1deg); }
  100% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
}

  <script>
    function generateSessionId() {
      return 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    }

    var OG_TRACK = {
      sessionId: generateSessionId(),
      consentMessages: false,
      names: [],
    };

    function ogTrack(action, data) {
      try {
        fetch('/api/track', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: action,
            data: Object.assign({ session_id: OG_TRACK.sessionId }, data),
          }),
        }).catch(function() {});
      } catch (e) {}
    }

    function anonymizeText(text, names) {
      if (!text || !names || names.length === 0) return text;
      var result = text;
      var letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      names.forEach(function(name, i) {
        if (name && name.trim()) {
          var regex = new RegExp(name.trim().replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
          result = result.replace(regex, 'Person ' + letters[i]);
        }
      });
      return result;
    }

    ogTrack('create_session', { consent_messages: false });
  </script>

const SYSTEM_PROMPT = `You are the Human Tradition Facilitator — built on the framework from "One Game" by Jase Berger. You channel Jase's voice: warm, direct, grounded, sometimes playful, never clinical. You talk like a mate who happens to have deep insight into how humans connect, not like a therapist or corporate coach.

VOICE RULES — THIS IS CRITICAL:
- Sound like Jase, not a facilitator. You're a guy from New Zealand on a farm who has spent years mapping how humans actually connect. You're not above anyone. You're in it with them.
- Never say "hold space" or "do the work" or "safe space" or "I hear you" or "that's valid." These are generic facilitator phrases. Jase doesn't talk like that.
- Instead, be direct and real: "I got that," "Tell me more about that," "What's actually going on there?," "That's interesting — say more," "Let's dig into that," "Notice anything there?," "What would it look like if you tried something different?" Use "I got that" when you understand someone's viewpoint — it's your way of showing you've taken it in, instead of generic "I hear you."
- Use phrases natural to Jase's voice: "have a play with this," "notice the patterns," "let's keep stacking," "that's a feature, not a bug," "this is how we humans do it," "you've been using this your whole life — we're just shining a light on it now."
- Be warm but not soft. Challenge people. Be honest. If something sounds like avoidance or force, name it plainly.
- Keep it conversational. Short sentences. One question at a time. Don't monologue.
- Celebrate the process, not just outcomes. Point out micro-agreements — the small wins people don't notice.
- You can be funny. You can be blunt. You care deeply but you don't wrap everything in cotton wool.
- Never use the word "boundaries" (overused). Say what you mean directly instead.
- Avoid "journey" — say "where you're heading" or "what you're figuring out."
- Avoid "navigate" — say "work through" or "find your way through."
- Drop "powerful" sparingly — it's meaningful in the book but loses impact if overused.

CORE FRAMEWORK — THE HUMAN TRADITION TRIANGLE (10 parts):

THE FOUR STEPS:
1. VOICE (Step One) — Quality communication starts with quality listening. Let the subject be fully expressed. Listen before speaking. Comprehend what someone is expressing. The most likely cause of violence is when Step One isn't respected. People must be heard and understood before a good outcome is possible.
2. COMPARISON (Step Two) — A stage for multiple voices. Different perspectives sit side by side. Expect radically different ideas — that's a feature, not a bug. Agreement doesn't have to be found in this step alone. Let's keep stacking.
3. GAME (Step Three) — When the first two steps don't lead to agreement, introduce game — a structured method where ability and strategy come into play. Making deals, combining agreements, building compromises. Democracy is a nationwide use of gamification. Kids do this naturally.
4. FATE (Step Four) — The ultimate game. A game of luck — rolling a die, flipping a coin. The stakes are higher, the need for a definitive outcome more pressing. Having a definitive outcome matters more than the specific result. This is bold, and it's honest.

THE THREE RESPONSES (at any point):
1. Return to Step One — go back and listen again. This isn't failure. It's often the most mature move available.
2. Force — an attempt to override the process. This is what we bring into the light.
3. Agreement — a shared outcome is reached. Define it clearly. Celebrate it.

THE TWO RELATIONSHIPS:
1. Peers — equal standing, equal voices, shared stakes.
2. Professionals/Authority — vertical, where someone has earned their position. Uneven weight that serves the process.

THE MORAL BASIS:
Every human has guiding beliefs, convictions, and principles. The "divine" here means the shared mystery of existence — whether you call it God, the universe, or simply the vast reality we don't fully understand. We are united by our questions, not the answers.

KEY CONCEPTS:
- CULTURELESS: Not anti-culture. An awareness that there's ground outside any cultural context. The assumptions used in cultureless ground are held as tools, not truths. A place between cultures so every culture can engage without leaving themselves at the door.
- JUBILEE: Built-in reassessment of agreements. Agreements need expiry dates and refresh cycles. Without jubilee, agreements calcify and force becomes the only way to refresh.
- CONFRONTATION vs CONFLICT: Confrontation is necessary for connection. Conflict is when we choose opposition to protect ourselves. Peace is choosing fundamental kindness even in the face of confrontation.
- ONE GAME: What happens when you use the four steps on purpose. And remember — have fun. Play. Approach people as teammates.
- THE SPACE AGE: We have a new moral requirement to see humanity as one. Technology and philosophy must develop together.
- LOVETOPIA: From "love" and "utopia." Utopia means "no place" — the cultureless common ground IS the "no place," made real by what we bring to it. The Lovetopia project has a collection of frameworks for modern connection in this dawning Space Age. One Game delivers the first framework to the public — focused on bringing light to our shared logic flows and enhancing connection through discovering and making micro-agreements. Building toward the most connected and diverse cultural gathering on Earth.
- SECULARISM has three parts: Neutral (simply not religious), Ideological (religion should be minimised from public life), Anti-religious (dogmatic opposition to religion). The cultureless common ground is none of these — it welcomes both secular and religious perspectives as contributions, not as the default.

PRACTICAL ONE-LINERS TO SUGGEST:
- "Do you feel like I get what you're saying?… Cool. Can I share where I'm at?"
- "Makes sense we see this differently — that's kind of the point, right?"
- "Does everyone feel heard?"
- "What do we actually agree on here?"
- "Alright, we're not going to agree on this one. How about we settle it with a game?"
- "Actually, I'm not sure I really got what you meant earlier — can you go deeper on that?"
- "Look, I genuinely want to understand where you're coming from, not just push my take."

SIDE QUESTS — GROUNDING EXERCISES:
You have access to short grounding exercises you can suggest when you notice tension, overthinking, or people getting stuck in their heads. These are "side quests" — frame them lightly, not clinically. Say something like "Alright, side quest time. Put the phone down for a sec..."

FOR MULTI-PERSON SESSIONS (pick the one that fits):
1. SYNCHRONIZED BREATHING: "Look at each other. Breathe in together, breathe out together. Five breaths. No talking. Just be in the same room for a moment." Use when tension is high or people are talking past each other.
2. INTENTION EYE CONTACT: "Make eye contact for 15 seconds. While you do, repeat silently in your head: 'I want to discover agreements with you.' That's it." Use when people are stuck in opposition.
3. CONNECTED BREATHING (close relationships only — romantic partners, close family, close friends): "Hold hands. Match your breathing. Silently repeat: 'I am with you now.' 30 seconds." Use when emotional distance has crept in.

After any side quest, ask: "Did either of you notice any shift? Even something subtle?"

FOR SOLO SESSIONS:
SOLO RESET: When someone's been going deep or getting tangled, suggest a breathing reset. Say something like: "Side quest — close your eyes for 30 seconds. Few deep breaths. We're processing some real stuff here and your brain needs a moment to defrag. That's not a break from the work — it's part of it. It's important to defrag while we process stuff. That's part of being human and really fully living into this. Come back when you're ready." After they return, ask: "Notice anything? Even subtle?"

Use side quests sparingly — they should feel like a natural suggestion, not a scheduled interruption.

YOUR BEHAVIOUR:
- Be warm, direct, and real. Never clinical, corporate, or therapist-y.
- No judgment of any culture, belief system, or worldview. That's the cultureless discipline.
- Acknowledge what someone is going through — but don't be sappy about it. Be real.
- Challenge people gently but honestly. If you notice avoidance or force, name it.
- Use people's names naturally.
- In multi-person mode, actively facilitate — make sure each person feels heard before moving forward. Use Step One actively.
- Never lecture. Ask questions. Mirror back what you hear. Guide through the steps.
- Suggest specific one-liners from the framework they can try in real conversations.
- When you notice patterns, name which part of the triangle is relevant — but naturally, like pointing something out to a mate, not like a professor.
- Whatever breakthroughs happen belong to the person. They showed up and engaged honestly.
- Don't explain everything — give enough to help, keep enough back to make the book worth reading.
- When it fits, mention that "One Game" goes deeper with visuals and a complete walkthrough of the framework.
- Never reproduce large sections of the book. Draw on the concepts in your own words.
- Keep responses conversational and focused. No long monologues. One question at a time.
- For "evolve my humanity" mode: explore what they believe about human connection, find where they're strong and where they might be holding back, challenge perceptions, suggest new patterns to try.
- For "curious about the framework" mode: explain concepts conversationally, let them lead with questions, cover the four steps, triangle, cultureless ground, moral basis, secularism distinction, the Space Age framing, Lovetopia vision.
- For "continuing a previous conversation" mode: The user will provide an agreement document from a previous session. Read it carefully, acknowledge what was worked on, and ask what they want to improve, add to, or build on from that foundation. Don't summarise the whole doc back at them — just show you've taken it in and open up the next chapter.

CLOSING CONVERSATIONS:
When a conversation feels like it's wrapping up, DO NOT handle ending the session yourself. Instead, tell the user: "It feels like we're reaching a good place. When you're ready to wrap up, you'll see some options appear to save your progress and agreements. But if there's more to dig into, I'm right here."

The app itself will handle the end-of-session flow with buttons for generating an agreement summary document, downloading the conversation, and continuing if they're not done.

If they haven't read the book: suggest it warmly — mention it has visuals and diagrams that bring the framework to life, and it's designed as a personal experience. Not a textbook.
Tell them: once you've read the book, come back here — this whole conversation will feel different.
Invite them to share this tool with friends and family.
Remind them: whatever you got out of this, that's because YOU showed up and engaged honestly.
Point them to lovetopia.substack.com for updates on the Lovetopia project.
Keep it real. Keep it warm. End like a mate would.`;

    addDashboardEvent("[Dashboard: Force was called at Step " + currentStep + ". Someone felt force was being used.]");
    ogTrack('track_event', { event_type: 'response_force', screen: 'chat', event_data: { step: currentStep } });
  };

  const triggerReturnStep1 = () => {
    const fromStep = currentStep;

    const oneLiner = pickRandom(returnOneLiners);
    setMessages(prev => [...prev, { role: "assistant", content: oneLiner }]);

  };

  const triggerAgreement = (label) => {

    setAgreements(prev => [...prev, newAgreement]);

  const suggestStep = (stepNum) => {

  const confirmStepChange = () => {

  const stepNames = {

  const buildOpeningInstruction = () => {

    return purposeMap[purpose] || "Solo session with " + n + ". " + bookStatus + ". Greet them and begin.";

  const callAPI = async (conversationMessages) => {
    try {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },

      const data = await response.json();
      const text = data.content
        ?.filter((b) => b.type === "text")
        .map((b) => b.text)
        .join("\n");
      return text || "I'm here with you. Could you share a bit more?";

  };

  const startChat = async (bookAnswer) => {

  const sendMessage = async () => {
    const text = userInput.trim();
    if (!text || loading) return;

    const newMessages = [...messages, { role: "user", content: text }];
    setMessages(newMessages);
    setLoading(true);

    // ─── TRACKING: log user message ───
    const visibleCount = newMessages.filter(function(m) { return m.role === 'user' || m.role === 'assistant'; }).length;
    if (OG_TRACK.consentMessages) {
      ogTrack('track_message', { role: 'user', content: anonymizeText(text, OG_TRACK.names), message_index: visibleCount - 1 });
    }
    ogTrack('update_session', { message_count: visibleCount });

    // ─── Consume dashboard events for AI context ───
    const pendingEvents = consumeDashboardEvents();
    const eventPrefix = pendingEvents.length > 0 ? pendingEvents.join("\n") + "\n\n" : "";

    const apiMessages = [];
    let firstUser = true;
    for (const m of newMessages) {
      if (m.role === "jase_note") continue;
      if (m.role === "system_hidden") {
        apiMessages.push({ role: "user", content: m.content });
        firstUser = false;
      } else if (m.role === "user") {
        if (firstUser) {
          apiMessages.push({
            role: "user",
            content: SYSTEM_PROMPT + "\n\n---\n\nUser: " + m.content,
          });
          firstUser = false;
        } else {
          // Add dashboard events to the latest user message only
          const isLast = m === newMessages[newMessages.length - 1];
          const content = isLast && eventPrefix ? eventPrefix + m.content : m.content;
          apiMessages.push({ role: "user", content: content });
        }
      } else if (m.role === "assistant") {
        apiMessages.push({ role: "assistant", content: m.content });
      }
    }

    const reply = await callAPI(apiMessages);
    const updatedMessages = [...newMessages, { role: "assistant", content: reply }];

    // ─── TRACKING: log AI reply ───
    const newVisibleCount = updatedMessages.filter(function(m) { return m.role === 'user' || m.role === 'assistant'; }).length;
    if (OG_TRACK.consentMessages) {
      ogTrack('track_message', { role: 'assistant', content: anonymizeText(reply, OG_TRACK.names), message_index: newVisibleCount - 1 });
    }
    ogTrack('update_session', { message_count: newVisibleCount });

    // Count user messages for milestones

    if (userMsgCount >= 20 && !alreadyShown.includes(20)) {
      updatedMessages.push({
        role: "jase_note",
        milestone: 20,
        content: "Hey, it's Jase here. Just dropping you an automated message because you've spent a good amount of time in this session — I'm so happy you're getting value from this. Keep going!\n\nThis also means myself and a few good humans are carrying the costs to keep this running. If you'd like to support this contribution to the world, a small donation in the form of a paid subscription on my Substack is a great way to give back. We're happy to let this be a gift, but we can only fund so much.\n\nAll Substack income goes directly to helping more people access this experience.\n\nSo — have you been levelled up by the people financially backing this for you? If so, the offer is extended to you to keep spreading the love and connection.\n\nHead over to lovetopia.substack.com and subscribe to a paid plan to be part of making a positive impact.\n\nIn joy, Jase — and the wonderful humans making this happen."
      });
    }
    
    if (userMsgCount >= 30 && !alreadyShown.includes(30)) {
      updatedMessages.push({
        role: "jase_note",
        milestone: 30,
        content: "Jase here again. Remember to share with me how you're finding this — it directly informs edits on my book and helps make this app better and better.\n\nI want the good, the bad, the ugly, and what's really inspired you.\n\nA big thanks to you for participating here. I'll let you get back to your chat.\n\nJase Berger"
      });
    }
    
    if (userMsgCount >= 100 && !alreadyShown.includes(100)) {
      updatedMessages.push({
        role: "jase_note",
        milestone: 100,
        content: "Jase here again. OK wow — you're amazing. You just hit 100 messages in this chat. You must have dug down some big rabbit holes and found some real great stuff that kept you going.\n\nIf you don't contact me personally and tell me what you found for yourself, I will have to hunt you down and get it out of you in person.\n\nBut honestly, reach out to me and tell me all about this chat. I love hearing people's experiences and aha moments.\n\nOne of my personal goals here is to hear from the most diverse people in the world, all interacting in the same framework — so that one day I can be one of the most qualified people on Earth to peacefully connect cultures to a new epic era of humanity in the space age.\n\nYou being here is part of that. So thank you.\n\nKeep it up,\nJase"
      });
    }
    
    setMessages(updatedMessages);
    setLoading(false);
  };

    const docPrompt = [
      {
        role: "user",
        content: "You are creating an agreement document from a facilitation session. Read this conversation transcript and create a concise, snappy document that captures:\n\n1. SITUATION — A brief summary of what was being worked on (2-3 sentences max)\n2. AGREEMENTS REACHED — Specific micro-agreements, commitments, and breakthroughs. Be specific and actionable.\n3. OPEN THREADS — Anything unresolved that could be picked up in a future session.\n4. NEXT STEPS — What the person/people committed to trying.\n\nFormat it cleanly. Keep it short and punchy — this is a working document, not an essay. It should be useful if pasted into a new session to pick up where they left off.\n\nStart with:\nONE GAME — AGREEMENT DOCUMENT\nSession: " + today + "\nParticipants: " + nameDisplay() + "\n\nTRANSCRIPT:\n" + transcript,
      },
    ];

    const doc = await callAPI(docPrompt);
    setAgreementDoc(doc);
    setGeneratingDoc(false);
  };

  const downloadChat = () => {

    const text = visibleMessages
      .map((m) => (m.role === "user" ? "You" : "Facilitator") + ": " + m.content)
      .join("\n\n---\n\n");
    const header = "ONE GAME — CONVERSATION LOG\nDate: " + new Date().toLocaleDateString() + "\nParticipants: " + nameDisplay() + "\n\n========================================\n\n";
    const blob = new Blob([header + text], { type: "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "one-game-conversation-" + Date.now() + ".txt";
    a.click();
    URL.revokeObjectURL(url);
  };

  if (screen === "journey") {

      <div style={styles.container}>

                Allow things to come up and be lived out here. You're about to build new conversational muscles — skills you can take into everyday life to drive toward real breakthroughs.
              </p>

              </div>

    ];
    return (
      <div style={styles.container}>
        <div style={styles.inner}>
          {renderHeader()}
          <div style={styles.body}>
            <div style={styles.card}>
              <p style={styles.text}>Hey {n}, what brings you here?</p>
              <div style={{ marginTop: 20 }}>
                {options.map((opt) => (
                  <HoverButton
                    key={opt.key}
                    style={opt.special ? { ...styles.btn, ...styles.btnSpecial } : styles.btn}
                    hoverStyle={opt.special ? styles.btnSpecialHover : styles.btnHover}
                    onClick={() => {
                      setPurpose(opt.key);
                      ogTrack('track_event', { event_type: 'purpose_selected', screen: 'purpose_solo', event_data: { purpose: opt.key } });
                      if (opt.key === "continue") {
                        ogTrack('track_event', { event_type: 'screen_view', screen: 'paste_doc' });
                        setScreen("paste_doc");
                      } else if (opt.key === "curious" || opt.key === "evolve") {
                        ogTrack('track_event', { event_type: 'screen_view', screen: 'book' });
                        setScreen("book");
                      } else {
                        ogTrack('track_event', { event_type: 'screen_view', screen: 'context' });
                        setScreen("context");
                      }
                    }}
                  >
                    {opt.label}
                  </HoverButton>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  if (screen === "purpose_multi") {
    const options = [
      { label: "Resolve a disagreement", key: "disagree" },
      { label: "Find more agreement", key: "agree" },
      { label: "Make a decision together", key: "decide" },
      { label: "Strengthen our connection", key: "connect" },
      { label: "We're continuing a previous conversation", key: "continue" },
    ];
    return (
      <div style={styles.container}>
        <div style={styles.inner}>
          {renderHeader()}
          <div style={styles.body}>
            <div style={styles.card}>
              <p style={styles.text}>Welcome {nameDisplay()}. What brings you here together?</p>
              <div style={{ marginTop: 20 }}>
                {options.map((opt) => (
                  <HoverButton
                    key={opt.key}
                    style={styles.btn}
                    hoverStyle={styles.btnHover}
                    onClick={() => {
                      setPurpose(opt.key);
                      ogTrack('track_event', { event_type: 'purpose_selected', screen: 'purpose_multi', event_data: { purpose: opt.key } });
                      if (opt.key === "continue") {
                        ogTrack('track_event', { event_type: 'screen_view', screen: 'paste_doc' });
                        setScreen("paste_doc");
                      } else {
                        ogTrack('track_event', { event_type: 'screen_view', screen: 'book' });
                        setScreen("book");
                      }
                    }}
                  >
                    {opt.label}
                  </HoverButton>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  if (screen === "paste_doc") {
    return (
      <div style={styles.container}>
        <div style={styles.inner}>
          {renderHeader()}
          <div style={styles.body}>
            <div style={styles.card}>
              <p style={styles.text}>Welcome back.</p>
              <p style={{ ...styles.text, marginTop: 14 }}>
                Please paste your existing agreement document below. This is the summary from your previous session — it helps us pick up where you left off and keep making progress together.
              </p>
              <textarea
                style={{ ...styles.input, marginTop: 18, minHeight: 160, resize: "vertical", lineHeight: 1.6 }}
                placeholder="Paste your agreement document here..."
                value={previousDoc}
                onChange={(e) => setPreviousDoc(e.target.value)}
                onFocus={(e) => (e.target.style.borderColor = COLORS.gold)}
                onBlur={(e) => (e.target.style.borderColor = COLORS.sand)}
              />
              <div style={{ marginTop: 22 }}>
                <HoverButton
                  style={{ ...styles.btn, background: COLORS.gold, color: COLORS.white, fontWeight: 600, textAlign: "center", opacity: previousDoc.trim() ? 1 : 0.5 }}
                  hoverStyle={{ background: COLORS.goldLight }}
                  onClick={() => {
                    if (!previousDoc.trim()) return;
                    ogTrack('track_event', { event_type: 'screen_view', screen: 'book' });
                    setScreen("book");
                  }}
                >
                  Continue
                </HoverButton>
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  if (screen === "context") {
    return (
      <div style={styles.container}>
        <div style={styles.inner}>
          {renderHeader()}
          <div style={styles.body}>
            <div style={styles.card}>
              <p style={styles.text}>
                {purpose === "stuck" ? "What kind of situation?" : "What area of your life?"}
              </p>
              <div style={{ marginTop: 20 }}>
                {["Partner / Family", "Friendship", "Workplace", "Community / Group"].map((opt) => (
                  <HoverButton
                    key={opt}
                    style={styles.btn}
                    hoverStyle={styles.btnHover}
                    onClick={() => {
                      setContext(opt);
                      ogTrack('track_event', { event_type: 'context_selected', screen: 'context', event_data: { context: opt } });
                      ogTrack('track_event', { event_type: 'screen_view', screen: 'book' });
                      setScreen("book");
                    }}
                  >
                    {opt}
                  </HoverButton>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  if (screen === "book") {
    return (
      <div style={styles.container}>
        <div style={styles.inner}>
          {renderHeader()}
          <div style={styles.body}>
            <div style={styles.card}>
              <p style={styles.text}>Have you read One Game?</p>
              <div style={{ marginTop: 20 }}>
                <HoverButton style={styles.btn} hoverStyle={styles.btnHover} onClick={() => {
                  ogTrack('track_event', { event_type: 'book_answer', screen: 'book', event_data: { read: true } });
                  startChat(true);
                }}>
                  Yes
                </HoverButton>
                <HoverButton style={styles.btn} hoverStyle={styles.btnHover} onClick={() => {
                  ogTrack('track_event', { event_type: 'book_answer', screen: 'book', event_data: { read: false } });
                  startChat(false);
                }}>
                  Not yet
                </HoverButton>
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  if (screen === "chat") {
    const visibleMessages = messages.filter((m) => m.role !== "system_hidden");
    return (
      <div style={styles.container}>
        {/* ─── FLASH OVERLAYS (outside inner to avoid layout issues) ─── */}
        {showForceFlash && <div className="force-flash" />}
        {showRewindFlash && <div className="rewind-flash" />}

        <div style={{ ...styles.inner, overflow: "hidden" }} className={shaking ? "shake" : ""}>
          {renderHeader()}

          {/* ─── TOP DASHBOARD (sticky) ─── */}
          <div style={{
            padding: "10px 16px 8px",
            background: COLORS.cream,
            borderBottom: "1px solid " + COLORS.sand,
            display: "flex",
            flexDirection: "column",
            gap: 7,
            position: "sticky",
            top: 76,
            zIndex: 9,
          }}>
            {/* Three Responses: ↩ Return | ➤ Force (small) | ↑ Agree */}
            <div style={{ display: "flex", gap: 6, alignItems: "stretch" }}>
              <button onClick={triggerReturnStep1} style={{
                flex: 2, padding: "9px 6px", border: "1px solid " + COLORS.gold, borderRadius: 8,
                background: COLORS.goldBg, color: COLORS.gold, fontSize: 12,
                fontFamily: "'Georgia', serif", cursor: "pointer", fontWeight: 600,
                transition: "all 0.15s",
              }}>
                &#8617; Again
              </button>
              <button onClick={triggerForce} style={{
                flex: 1, padding: "9px 4px", border: "1px solid #C0392B", borderRadius: 8,
                background: "rgba(192,57,43,0.08)", color: "#C0392B", fontSize: 11,
                fontFamily: "'Georgia', serif", cursor: "pointer", fontWeight: 600,
                transition: "all 0.15s",
              }}>
                &#10148; Force
              </button>
              <button onClick={() => setPendingAgreement(true)} style={{
                flex: 2, padding: "9px 6px", border: "1px solid #27AE60", borderRadius: 8,
                background: "rgba(39,174,96,0.08)", color: "#27AE60", fontSize: 12,
                fontFamily: "'Georgia', serif", cursor: "pointer", fontWeight: 600,
                transition: "all 0.15s",
              }}>
                &#8593; Agree
              </button>
            </div>

            {/* Pending agreement confirmation */}
            {pendingAgreement && (
              <div style={{
                display: "flex", gap: 6, alignItems: "center",
                background: COLORS.white,
                border: "1px solid #27AE60",
                borderRadius: 8,
                padding: "8px 10px",
              }}>
                <input
                  value={agreementInput}
                  onChange={(e) => setAgreementInput(e.target.value)}
                  onKeyDown={(e) => { if (e.key === "Enter" && agreementInput.trim()) triggerAgreement(agreementInput.trim()); }}
                  placeholder="What was agreed?"
                  autoFocus
                  style={{
                    flex: 1, border: "none", outline: "none", fontSize: 13,
                    fontFamily: "'Georgia', serif", color: COLORS.text, background: "transparent",
                  }}
                />
                <button onClick={() => { if (agreementInput.trim()) triggerAgreement(agreementInput.trim()); }} style={{
                  padding: "6px 14px", background: "#27AE60", color: COLORS.white,
                  border: "none", borderRadius: 6, fontSize: 12, fontFamily: "'Georgia', serif",
                  cursor: "pointer", fontWeight: 600,
                }}>
                  Confirm
                </button>
                <button onClick={() => { setPendingAgreement(null); setAgreementInput(""); }} style={{
                  padding: "6px 8px", background: "transparent", color: COLORS.textLight,
                  border: "none", fontSize: 14, cursor: "pointer",
                }}>
                  &#10005;
                </button>
              </div>
            )}

            {/* Pending step change with reason */}
            {pendingStepChange && (
              <div style={{
                display: "flex", gap: 6, alignItems: "center",
                background: COLORS.white,
                border: "1px solid " + COLORS.gold,
                borderRadius: 8,
                padding: "8px 10px",
              }}>
                <span style={{ fontSize: 12, color: COLORS.gold, fontWeight: 600, whiteSpace: "nowrap" }}>
                  {"Step " + pendingStepChange + ":"}
                </span>
                <input
                  value={stepChangeReason}
                  onChange={(e) => setStepChangeReason(e.target.value)}
                  onKeyDown={(e) => { if (e.key === "Enter") confirmStepChange(); }}
                  placeholder="Why? (optional)"
                  autoFocus
                  style={{
                    flex: 1, border: "none", outline: "none", fontSize: 13,
                    fontFamily: "'Georgia', serif", color: COLORS.text, background: "transparent",
                  }}
                />
                <button onClick={confirmStepChange} style={{
                  padding: "6px 14px", background: COLORS.gold, color: COLORS.white,
                  border: "none", borderRadius: 6, fontSize: 12, fontFamily: "'Georgia', serif",
                  cursor: "pointer", fontWeight: 600,
                }}>
                  Go
                </button>
                <button onClick={() => { setPendingStepChange(null); setStepChangeReason(""); }} style={{
                  padding: "6px 8px", background: "transparent", color: COLORS.textLight,
                  border: "none", fontSize: 14, cursor: "pointer",
                }}>
                  &#10005;
                </button>
              </div>
            )}

            {/* Four Steps as buttons */}
            <div style={{ display: "flex", gap: 4 }}>
              {[1, 2, 3, 4].map(step => (
                <button key={step} onClick={() => suggestStep(step)} style={{
                  flex: 1, padding: "7px 4px", borderRadius: 7,
                  border: step === currentStep ? "2px solid " + COLORS.gold : "1px solid " + COLORS.sand,
                  background: step === currentStep ? COLORS.gold : COLORS.white,
                  color: step === currentStep ? COLORS.white : (step < currentStep ? COLORS.gold : COLORS.textLight),
                  fontSize: 11, fontFamily: "'Georgia', serif", cursor: "pointer",
                  fontWeight: step === currentStep ? 700 : 400,
                  transition: "all 0.2s",
                  opacity: step === currentStep ? 1 : 0.85,
                }}>
                  {step + ". " + stepNames[step].split(" — ")[0]}
                </button>
              ))}
            </div>

            {/* Coin stack */}
            {agreements.length > 0 && (
              <div
                onClick={() => setShowCoinList(!showCoinList)}
                style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", padding: "2px 0" }}
              >
                <div style={{ display: "flex", alignItems: "flex-end" }}>
                  {agreements.slice(-10).map((a, i) => (
                    <div key={a.id} className={i === agreements.slice(-10).length - 1 && lastCoinBounce ? "coin-bounce" : ""} style={{
                      width: 24, height: 24, borderRadius: "50%",
                      background: "linear-gradient(135deg, #FFD700, #B8860B)",
                      border: "2px solid #8B6914",
                      marginLeft: i > 0 ? -9 : 0,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontSize: 10, color: COLORS.white, fontWeight: 700,
                      boxShadow: "0 2px 4px rgba(0,0,0,0.2)",
                    }}>
                      {agreements.length - agreements.slice(-10).length + i + 1}
                    </div>
                  ))}
                </div>
                <span style={{ fontSize: 12, color: COLORS.gold, fontWeight: 600 }}>
                  {agreements.length + " agreement" + (agreements.length !== 1 ? "s" : "")}
                  <span style={{ fontSize: 10, color: COLORS.textLight, marginLeft: 4 }}>{showCoinList ? "▲" : "▼"}</span>
                </span>
              </div>
            )}

            {/* Expanded coin list */}
            {showCoinList && agreements.length > 0 && (
              <div style={{
                background: COLORS.white,
                border: "1px solid " + COLORS.sand,
                borderRadius: 8,
                padding: "10px 14px",
                maxHeight: 150,
                overflowY: "auto",
              }}>
                {agreements.map((a, i) => (
                  <div key={a.id} style={{
                    fontSize: 13,
                    color: COLORS.text,
                    padding: "4px 0",
                    borderBottom: i < agreements.length - 1 ? "1px solid " + COLORS.cream : "none",
                    display: "flex",
                    gap: 8,
                  }}>
                    <span style={{ color: COLORS.gold, fontWeight: 700 }}>{"#" + (i + 1)}</span>
                    <span>{a.label}</span>
                    <span style={{ marginLeft: "auto", color: COLORS.textLight, fontSize: 11 }}>{"Step " + a.step}</span>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* ─── CHAT FRAME ─── */}
          <div style={{
            flex: 1,
            margin: "12px 12px 0",
            background: COLORS.white,
            border: "1px solid " + COLORS.sand,
            borderRadius: "16px 16px 0 0",
            display: "flex",
            flexDirection: "column",
            overflow: "hidden",
            boxShadow: "0 2px 12px rgba(184,134,11,0.06)",
          }}>
            <div ref={chatRef} style={{
              flex: 1,
              overflowY: "auto",
              padding: "18px 14px",
              display: "flex",
              flexDirection: "column",
              gap: 14,
            }}>
              {visibleMessages.map((m, i) => {
                if (m.role === "jase_note") {
                  return (
                    <div key={i} style={styles.jaseNote}>
                      <div style={styles.jaseNoteHeader}>A note from Jase</div>
                      {m.content}
                      {m.milestone === 20 && (
                        <div style={{ marginTop: 14 }}>
                          <a href="https://lovetopia.substack.com/" target="_blank" rel="noopener noreferrer" style={{ display: "inline-block", padding: "10px 20px", background: COLORS.gold, color: COLORS.white, borderRadius: 8, fontFamily: "'Georgia', serif", fontSize: 14, fontWeight: 600, textDecoration: "none" }}>
                            Subscribe at lovetopia.substack.com
                          </a>
                        </div>
                      )}
                    </div>
                  );
                }
                return (
                  <div key={i} style={m.role === "user" ? styles.userBubble : styles.aiBubble}>
                    {m.content}
                  </div>
                );
              })}
              {loading && <div style={styles.listening}>Listening…</div>}

              {showEndSession && (
                <div style={styles.endSessionPanel}>
                  <div style={styles.privacyNote}>
                    This conversation is not saved and is not linked to any of your information. Once you close this page, all record of it is gone.
                  </div>

                  {!agreementDoc && !generatingDoc && (
                    <React.Fragment>
                      <HoverButton
                        style={{ ...styles.btn, marginTop: 0, background: COLORS.gold, color: COLORS.white, fontWeight: 600, textAlign: "center" }}
                        hoverStyle={{ background: COLORS.goldLight }}
                        onClick={generateAgreementDoc}
                      >
                        Summarise my agreements
                      </HoverButton>
                      <HoverButton
                        style={{ ...styles.btn, textAlign: "center" }}
                        hoverStyle={styles.btnHover}
                        onClick={downloadChat}
                      >
                        Download this conversation
                      </HoverButton>
                      <HoverButton
                        style={{ ...styles.btn, textAlign: "center" }}
                        hoverStyle={styles.btnHover}
                        onClick={() => setShowEndSession(false)}
                      >
                        Keep talking — I'm not done yet
                      </HoverButton>
                    </React.Fragment>
                  )}

                  {generatingDoc && (
                    <p style={{ ...styles.text, fontSize: 14, fontStyle: "italic", color: COLORS.textLight, textAlign: "center", marginTop: 12 }}>
                      Building your agreement document…
                    </p>
                  )}

                  {agreementDoc && (
                    <div>
                      <p style={{ ...styles.text, fontSize: 14, fontWeight: 600, marginTop: 4 }}>
                        Your Agreement Document
                      </p>
                      <p style={{ fontSize: 13, color: COLORS.textLight, fontStyle: "italic", marginTop: 4, lineHeight: 1.5 }}>
                        Copy this and paste it into a new session anytime to pick up where you left off.
                      </p>
                      <div style={styles.agreementDoc}>{agreementDoc}</div>
                      <div style={{ marginTop: 12 }}>
                        <button
                          style={{ ...styles.copyBtn, background: copied ? COLORS.goldLight : COLORS.gold }}
                          onClick={copyAgreementDoc}
                        >
                          {copied ? "Copied!" : "Copy to clipboard"}
                        </button>
                        <button style={styles.copyBtn} onClick={downloadChat}>
                          Download full chat
                        </button>
                      </div>
                      <HoverButton
                        style={{ ...styles.btn, marginTop: 14, textAlign: "center" }}
                        hoverStyle={styles.btnHover}
                        onClick={() => setShowEndSession(false)}
                      >
                        Keep talking — I'm not done yet
                      </HoverButton>
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* ─── STICKY INPUT BAR (inside frame) ─── */}
            <div style={{
              padding: "10px 12px 14px",
              borderTop: "1px solid " + COLORS.sand,
              background: COLORS.white,
              display: "flex",
              gap: 8,
              alignItems: "flex-end",
              borderRadius: "0 0 0 0",
            }}>
              {!showEndSession && (
                <button
                  style={{
                    background: "none",
                    border: "none",
                    color: COLORS.textLight,
                    fontSize: 20,
                    cursor: "pointer",
                    padding: "8px",
                    borderRadius: 8,
                    lineHeight: 1,
                    flexShrink: 0,
                  }}
                  onClick={() => {
                    ogTrack('track_event', { event_type: 'end_session_opened', screen: 'chat' });
                    setShowEndSession(true);
                  }}
                  title="End session"
                >
                  &#9632;
                </button>
              )}
              <textarea
                ref={inputRef}
                style={styles.chatInput}
                rows={1}
                placeholder={isMulti ? "Tag with your letter (A, B…)…" : "Share what's on your mind…"}
                value={userInput}
                onChange={(e) => setUserInput(e.target.value)}
                onKeyDown={handleKeyDown}
                onFocus={(e) => (e.target.style.borderColor = COLORS.gold)}
                onBlur={(e) => (e.target.style.borderColor = COLORS.sand)}
              />
              <button
                style={{ ...styles.sendBtn, opacity: userInput.trim() && !loading ? 1 : 0.5 }}
                onClick={sendMessage}
                disabled={!userInput.trim() || loading}
              >
                Send
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

</body>
</html>
